name: ForgeFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
      TESTING: "True"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest httpx email-validator pip-audit==2.7.3

      - name: Audit Python Dependencies
        run: pip-audit -r backend/requirements.txt --desc on --severity high --fail-on-vuln-found

      - name: Run Backend Tests
        run: |
          PYTHONPATH=backend pytest backend

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Audit npm Dependencies
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Lint and Build Frontend
        run: |
          cd frontend
          npm run build
