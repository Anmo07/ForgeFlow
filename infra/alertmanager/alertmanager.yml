global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'noreply@forgeflow.local'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'webhook-receiver'
  routes:
    - match:
        severity: warning
      receiver: 'email-receiver'
    - match:
        severity: critical
      receiver: 'webhook-receiver'

receivers:
  - name: 'webhook-receiver'
    webhook_configs:
      - url: 'http://localhost:5000/webhook' # Slack-compatible webhook path (can be overridden)
        send_resolved: true

  - name: 'email-receiver'
    email_configs:
      - to: 'admin@forgeflow.local'
        send_resolved: true
        headers:
          subject: '[Alertmanager] {{ .Status | toUpper }} - {{ .GroupLabels.alertname }}'
