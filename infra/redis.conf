# Redis configuration for ForgeFlow (Production Hardened)

# Network settings
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security Configuration
# Rename dangerous commands to prevent accidental database wipe or server takeover
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN "SHUTDOWN_SECURE"
rename-command CONFIG "CONFIG_SECURE"
# rename-command KEYS ""

# Memory Management
# Limit memory usage for task broker / caching database
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence settings
# RDB Snapshotting settings:
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append Only Mode (highly recommended for Celery task durability)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes

# General settings
loglevel notice
logfile ""
databases 16
