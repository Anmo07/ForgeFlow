groups:
  - name: forgeflow_critical
    rules:

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate above 5% for 2 minutes"

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 2s for 5 minutes"

      - alert: DatabaseConnectionPoolExhausted
        expr: forgeflow_db_pool_checked_out / forgeflow_db_pool_size > 0.9
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool above 90% utilization"

      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Celery queue depth above 50 tasks for 5 minutes — workers may be falling behind"

      - alert: CeleryTaskHighFailureRate
        expr: rate(celery_tasks_total{state="FAILURE"}[10m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Celery task failure rate above 10% for 3 minutes"

      - alert: DependencyDown
        expr: forgeflow_dependency_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Critical dependency {{ $labels.dependency }} is unreachable"

      - alert: ContainerRestarting
        expr: increase(container_last_seen[5m]) < 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} has restarted"

      - alert: PDFGenerationFailureSpike
        expr: rate(forgeflow_pdf_generation_total{status="failure"}[10m]) > 0.2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation failure rate above 20% in last 10 minutes"

      - alert: HighLoginFailureRate
        expr: rate(forgeflow_login_failures_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "More than 10 failed login attempts per second — possible credential stuffing"
